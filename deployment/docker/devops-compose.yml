name: devops-tools

services:

  postgres:

    image: postgres:16

    container_name: sonarqube-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar123
      POSTGRES_DB: sonarqube

    volumes:
      - sonar-postgres:/var/lib/postgresql/data

    networks:
      - devops-network

  sonarqube:

    image: sonarqube:lts-community

    container_name: sonarqube

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "9000:9000"

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar123

    volumes:
  - /home/admin_01/sonarqube/data:/opt/sonarqube/data
  - /home/admin_01/sonarqube/extensions:/opt/sonarqube/extensions
  - /home/admin_01/sonarqube/logs:/opt/sonarqube/logs

    networks:
      - devops-network

volumes:

  sonar-postgres:

networks:

  devops-network:
    external: true
